name: SA Insight Hub — Data Scrapers

on:
  # Real-time topics: forex + energy every 30 min
  schedule:
    - cron: "*/30 * * * *"    # forex + energy (real-time)
    - cron: "0 6 * * 1"       # water — every Monday 06:00 UTC
    - cron: "0 5 1 * *"       # finance/property — 1st of month
    - cron: "0 4 1 1,4,7,10 *" # crime/employment/health — quarterly

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      topics:
        description: "Topics to scrape (space-separated, or 'all')"
        required: false
        default: "all"
      parallel:
        description: "Run in parallel?"
        type: boolean
        default: false

jobs:
  scrape-realtime:
    name: Scrape real-time topics
    runs-on: ubuntu-latest
    # Only on the */30 schedule OR manual with all/forex/energy
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/30 * * * *'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run real-time scrapers
        run: |
          mkdir -p data logs
          if [ "${{ github.event.inputs.topics }}" = "all" ] || [ -z "${{ github.event.inputs.topics }}" ]; then
            python run_scrapers.py --topics forex energy
          else
            python run_scrapers.py --topics ${{ github.event.inputs.topics }}
          fi

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: update forex + energy [skip ci]"
          file_pattern: "data/*.json"
          commit_user_name: "SA Insight Bot"
          commit_user_email: "bot@sa-insight-hub.co.za"

  scrape-weekly:
    name: Scrape weekly topics (water)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 6 * * 1'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run weekly scrapers
        run: |
          mkdir -p data logs
          python run_scrapers.py --topics water finance
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: weekly update — water + finance [skip ci]"
          file_pattern: "data/*.json"

  scrape-quarterly:
    name: Scrape quarterly topics
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 4 1 1,4,7,10 *'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run all scrapers (quarterly refresh)
        run: |
          mkdir -p data logs
          python run_scrapers.py --parallel
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: quarterly full refresh [skip ci]"
          file_pattern: "data/*.json"
